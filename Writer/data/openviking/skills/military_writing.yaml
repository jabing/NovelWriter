# Military Writing Skill
# Contains domain knowledge for military fiction writing

skill_id: military_writing
name: Military Fiction Writing
description: Domain knowledge for writing military fiction
version: 1.0.0

# Core Knowledge Areas
knowledge_areas:
  organization:
    - Military ranks and hierarchies
    - Unit organization (squad, platoon, company, battalion)
    - Chain of command
    - Military bureaucracy
    - Logistics and supply chains
    
  tactics_strategy:
    - Basic tactical formations
    - Offensive and defensive operations
    - Combined arms warfare
    - Asymmetric warfare
    - Naval and aerial operations
    - Historical battle analysis
    
  technology:
    - Weapons systems (historical and modern)
    - Vehicles and equipment
    - Communications technology
    - Intelligence gathering
    - Medical capabilities
    
  psychology:
    - Combat stress and PTSD
    - Unit cohesion and morale
    - Leadership under fire
    - Fear and courage
    - Veteran experience

# Writing Guidelines
guidelines:
  - Use correct military terminology consistently
  - Understand chain of command implications
  - Show realistic engagement ranges and weapon effects
  - Balance action with strategic thinking
  - Show human elements in warfare
  - Consider fog of war and chaos of battle
  - Avoid glorifying violence

# Rank Structures (Examples)
ranks:
  army_enlisted:
    - Private (E-1/E-2)
    - Corporal (E-4)
    - Sergeant (E-5)
    - Staff Sergeant (E-6)
    - Sergeant First Class (E-7)
    - Master Sergeant (E-8)
    - Sergeant Major (E-9)
    
  army_officers:
    - Second Lieutenant (O-1)
    - First Lieutenant (O-2)
    - Captain (O-3)
    - Major (O-4)
    - Lieutenant Colonel (O-5)
    - Colonel (O-6)
    - General (O-7+)

# Combat Writing Elements
combat_elements:
  sensory:
    - Sound (weapon fire, explosions, shouting)
    - Smell (cordite, blood, smoke)
    - Vibration (impacts, engines)
    - Visual chaos
    
  psychological:
    - Time distortion
    - Focus narrowing
    - Fear response
    - Adrenaline effects
    
  tactical:
    - Cover and concealment
    - Suppression fire
    - Flanking maneuvers
    - Withdrawal under fire

# Common Pitfalls
pitfalls:
  avoid:
    - Infinite ammunition
    - Heroes never miss
    - Enemies always miss protagonists
    - Ignoring wounds
    - Modern sensibilities in historical settings
    - Glorifying war without cost
    - One-dimensional enemy
    
  embrace:
    - Confusion and chaos
    - Friendly fire incidents
    - Equipment failures
    - Moral ambiguity
    - Lasting psychological impact
    - Human cost on all sides

# Unit Dynamics
unit_dynamics:
  - Shared hardship bonds
  - Dark humor as coping
  - Protectiveness toward comrades
  - New guy vs veteran tension
  - Leadership challenges
  - Grief and loss processing
