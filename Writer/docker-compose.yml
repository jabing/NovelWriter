# docker-compose.yml
# Production deployment configuration

version: '3.8'

services:
  novel-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-writing-agent
    restart: unless-stopped
    environment:
      - DEBUG=false
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4000}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - MEMORY_BACKEND=file
      - MEMORY_PATH=/app/data/memory
      - SCHEDULER_ENABLED=true
      - DAILY_CHAPTER_TIME=${DAILY_CHAPTER_TIME:-08:00}
      - MONITORING_ENABLED=true
      - LOG_LEVEL=INFO
      - WATTPAD_API_KEY=${WATTPAD_API_KEY:-}
      - ROYALROAD_USERNAME=${ROYALROAD_USERNAME:-}
      - ROYALROAD_PASSWORD=${ROYALROAD_PASSWORD:-}
      - KDP_ACCESS_KEY=${KDP_ACCESS_KEY:-}
      - KDP_SECRET_KEY=${KDP_SECRET_KEY:-}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Optional: Redis for caching (future use)
  # redis:
  #   image: redis:7-alpine
  #   container_name: novel-agent-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data

  # Optional: Backup scheduler
  backup:
    image: python:3.11-slim
    container_name: novel-agent-backup
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    command: >
      sh -c "while true; do
        tar -czf /app/backups/backup_$$(date +%Y%m%d_%H%M%S).tar.gz -C /app data 2>/dev/null || true;
        find /app/backups -name 'backup_*.tar.gz' -mtime +7 -delete 2>/dev/null || true;
        sleep 86400;
      done"

